name = "restroapi"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Observability: structured logs (no console.log in app code).
[observability]
enabled = true

# --- Non-secret vars (override locally via .dev.vars) ---
[vars]
SUPABASE_URL = "http://127.0.0.1:54321"
SUPABASE_ANON_KEY = "replace-with-local-supabase-anon-key"

# --- KV namespaces ---
# Create each with: wrangler kv namespace create <NAME>
# then replace the placeholder ids below with the returned id.
[[kv_namespaces]]
binding = "MENU_CACHE"
id = "menu_cache_placeholder"

[[kv_namespaces]]
binding = "SETTINGS_CACHE"
id = "settings_cache_placeholder"

[[kv_namespaces]]
binding = "FLAGS_CACHE"
id = "flags_cache_placeholder"

[[kv_namespaces]]
binding = "SMTP_COUNTERS"
id = "smtp_counters_placeholder"

[[kv_namespaces]]
binding = "DEVICE_TOKENS"
id = "device_tokens_placeholder"

# --- R2 bucket ---
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "restroapi-media"

# --- Workers Rate Limiting API ---
# Per-binding sliding window; namespace_id is an arbitrary unique int.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 100, period = 60 }
