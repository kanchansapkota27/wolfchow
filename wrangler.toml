name = "restroapi"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Observability: structured logs (no console.log in app code).
[observability]
enabled = true

# --- Non-secret vars (override locally via .dev.vars) ---
[vars]
SUPABASE_URL = "http://127.0.0.1:54321"
SUPABASE_ANON_KEY = "replace-with-local-supabase-anon-key"

# --- KV namespaces ---
# Create each with: wrangler kv namespace create <NAME>
# then replace the placeholder ids below with the returned id.
[[kv_namespaces]]
binding = "MENU_CACHE"
id = "menu_cache_placeholder"

[[kv_namespaces]]
binding = "SETTINGS_CACHE"
id = "settings_cache_placeholder"

[[kv_namespaces]]
binding = "FLAGS_CACHE"
id = "flags_cache_placeholder"

[[kv_namespaces]]
binding = "SMTP_COUNTERS"
id = "smtp_counters_placeholder"

[[kv_namespaces]]
binding = "DEVICE_TOKENS"
id = "device_tokens_placeholder"

# --- R2 bucket ---
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "restroapi-media"

# --- Workers Rate Limiting API ---
# Per-binding sliding window; namespace_id is an arbitrary unique int.
# One binding per route group so each can carry its own limit/period.
# Note: the binding does not enforce limits in local dev / tests (limit()
# returns success:true); middleware behaviour is unit-tested with injected
# limiters. See src/middleware/rateLimit.ts.

# Public (menu, slot generation) — keyed by CF-Connecting-IP
[[unsafe.bindings]]
name = "RATE_LIMITER_PUBLIC"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

# Order placement / payment confirm — keyed by JWT sub
[[unsafe.bindings]]
name = "RATE_LIMITER_ORDER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 30, period = 60 }

# Admin mutations — keyed by restaurant_id from JWT
[[unsafe.bindings]]
name = "RATE_LIMITER_WRITE"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 120, period = 60 }

# Order tracking endpoint — keyed by tracking token
[[unsafe.bindings]]
name = "RATE_LIMITER_TRACKING"
type = "ratelimit"
namespace_id = "1004"
simple = { limit = 10, period = 60 }
